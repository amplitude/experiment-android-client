name: Lint

on:
  pull_request:
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

    - name: Set up JDK 17
      uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
      with:
        java-version: 17
        distribution: 'zulu'

    - name: Lint
      run: ./gradlew ktlintCheck
